<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mobile.css">

    <script src="js/snake.js" defer></script>
    <script src="js/mobile-controls.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
    
</head>

<body>
    <header>
        <h1>Snake JS</h1>
        <button class="helpBtn" id="helpBtn"><img src="images/question.svg" alt="?"></button>
    </header>

    <canvas id="game" width="600" height="600"></canvas>

    <section>
        <button><a href="index.html">Restart</a></button>
        <h2>Points: <span id="points">0</span></h2>
    </section>

    <section class="help" id="helpSection">
        <button id="xBtn"><img src="images/cross.svg" alt="X"></button>
        <h1>Snake JS</h1>
        <p class="author">by Ibrahim Saif</p>
        <p>A simple snake game written entirely in HTML, JavaScript and CSS</p>
        <hr>
        <h2>Controls</h2>
        <p>WASD/Arrow Keys to move</p>
        <p>Space or P to pause</p>
        <p>R to restart</p>
        <hr>
        <h3>Source Code</h3>
        <a href="https://github.com/Ibrahim-Scythe/SnakeJS"><img src="images/github.svg" alt="Github"></a>
    </section>

    <aside class="mobile-controls">
        <button id="upBtn"><span><img src="images/arrow.svg" alt="&#x2B9D;"></span></button>
        <button id="leftBtn"><span><img src="images/arrow.svg" alt="&#x2B9D;"></span></button>
        <button id="rightBtn"><span><img src="images/arrow.svg" alt="&#x2B9D;"></span></button>        
        <button id="downBtn"><span><img src="images/arrow.svg" alt="&#x2B9D;"></span></button>
    </aside>

</body>

</html>
